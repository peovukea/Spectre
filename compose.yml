services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spectre
      POSTGRES_USER: spectre
      POSTGRES_PASSWORD: spectre_dev_password
    ports:
      - "55432:5432"
    volumes:
      - spectre-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectre -d spectre"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  spectre-postgres-data:
